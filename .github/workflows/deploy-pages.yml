name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '15 1 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser deep-translator

      - name: Install web dependencies
        run: npm ci

      - name: Refresh trends data
        run: python3 scripts/generate_trends.py

      - name: Commit refreshed data
        run: |
          if git diff --quiet src/data/trendsData.ts; then
            echo 'No data changes to commit.'
          else
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add src/data/trendsData.ts
            git commit -m 'chore: refresh daily trends data'
            git push
          fi

      - name: Build site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
